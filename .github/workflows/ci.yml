name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            agent-server/package-lock.json

      - name: Install dependencies
        run: npm run setup

      - run: npm test
      - run: npm run typecheck
      - run: npm run build

  protocol:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            agent-server/package-lock.json

      - name: Install dependencies
        run: npm run setup

      - name: Start agent-server
        working-directory: agent-server
        run: npm start &

      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4747/health && exit 0
            sleep 1
          done
          echo "agent-server did not become healthy in time"
          exit 1

      - name: Protocol verification
        run: npm run verify:server

      - name: Agent-server integration tests
        working-directory: agent-server
        run: node test.mjs
