services:
  agent-server:
    build: ./agent-server
    ports:
      - "4747:4747"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4747/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_WS_URL: ws://localhost:4747/ws
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_WS_URL: ws://localhost:4747/ws
    depends_on:
      agent-server:
        condition: service_healthy
